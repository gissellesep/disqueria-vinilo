<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Disquería de Vinilo</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css" />
</head>

<body>

<div id="app" class="container my-4">

  <!-- HEADER (logo + título juntos) -->
  <div class="header">
    <img src="img/logo.png" class="logo">
    <h1>{{ titulo }}</h1>
  </div>

  <!-- BUSCADOR -->
  <input 
    v-model="busqueda" 
    class="form-control mb-3" 
    placeholder="Buscar por álbum o artista..."
  >

  <!-- FILTROS -->
  <div class="text-center mb-3">
    <button class="btn btn-dark m-1" @click="categoria='todos'">Todos</button>
    <button class="btn btn-dark m-1" @click="categoria='jazz'">Jazz</button>
    <button class="btn btn-dark m-1" @click="categoria='rock'">Rock</button>
    <button class="btn btn-dark m-1" @click="categoria='blues'">Blues</button>
  </div>

  <!-- CARGANDO -->
  <div v-if="cargando" class="text-center my-5">
    <div class="spinner-border text-dark"></div>
    <p>Cargando catálogo...</p>
  </div>

  <!-- ERROR -->
  <div v-else-if="error" class="alert alert-danger">
    {{ error }}
    <button @click="cargarDiscos" class="btn btn-sm btn-dark ms-2">
      Reintentar
    </button>
  </div>

  <!-- VACÍO -->
  <div v-else-if="discosFiltrados.length === 0" class="text-center">
    <p>No hay discos en esta categoría</p>
  </div>

  <!-- CATÁLOGO -->
  <div v-else class="row g-4">
    <div 
      v-for="disco in discosFiltrados" 
      :key="disco.id" 
      class="col-12 col-md-6 col-lg-4"
    >
      <div class="card h-100 shadow-sm">

        <img 
          :src="disco.imagen" 
          :alt="disco.album" 
          class="card-img-top img-disco"
        />

        <div class="card-body">
          <h5 class="card-title">{{ disco.album }}</h5>
          <p class="card-text">{{ disco.artista }}</p>

          <span class="badge bg-secondary">
            {{ disco.genero.toUpperCase() }}
          </span>

          <p class="mt-2 fw-bold">
            ${{ disco.precio.toLocaleString('es-CL') }}
          </p>

          <!-- EXTRA: disponible -->
          <p v-if="!disco.disponible" class="text-danger">
            No disponible
          </p>
        </div>

      </div>
    </div>
  </div>

</div>

<!-- Vue -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
